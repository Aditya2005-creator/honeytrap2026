<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — MyApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #444; margin-bottom: 6px; font-weight: 500; }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4f6ef7; }
    .error {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #cc0000;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    button {
      width: 100%;
      padding: 11px;
      background: #4f6ef7;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #3a59e8; }
    .footer { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
    .footer a { color: #4f6ef7; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account</p>

    {% if error %}
      <div class="error">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label for="username">Username or Email</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="off">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password">

      <button type="submit">Sign In</button>
    </form>

    <div class="footer">
      <a href="#">Forgot password?</a> &nbsp;·&nbsp; <a href="#">Create account</a>
    </div>
  </div>
</body>
</html>
