<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>403 Forbidden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif; background: #f8f8f8;
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .box { text-align: center; }
    h1 { font-size: 80px; color: #ddd; font-weight: 900; }
    p { font-size: 16px; color: #888; margin-top: 8px; }
    small { font-size: 12px; color: #bbb; display: block; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>403</h1>
    <p>Access Denied</p>
    <small>You don't have permission to access this resource.</small>
  </div>
</body>
</html>
